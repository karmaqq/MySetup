<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>MySetup Güncelleyici</title>
    <style>
      /* ── Temel Tasarım ────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #090b10;
        --surface: #0f1218;
        --border: #1e2535;
        --border2: #28344a;
        --text: #b8c6d8;
        --dim: #4e5f78;
        --bright: #e0eaf5;
        --accent: #e8a020;
        --accent-d: rgba(232, 160, 32, 0.15);
        --green: #3dd68c;
        --green-d: rgba(61, 214, 140, 0.12);
        --red: #f56060;
        --red-d: rgba(245, 96, 96, 0.12);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag; /* Pencereyi sürüklenebilir yapar */
      }

      /* ── Arka Plan Parıltısı ─────────────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 40% at 20% 10%,
            rgba(232, 160, 32, 0.06) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 60% at 80% 90%,
            rgba(74, 158, 255, 0.04) 0%,
            transparent 70%
          );
        pointer-events: none;
      }

      .logo {
        font-size: 24px;
        font-weight: 800;
        color: var(--bright);
        margin-bottom: 30px;
        letter-spacing: -0.5px;
      }
      .logo span {
        color: var(--accent);
      }

      .card {
        width: 400px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        -webkit-app-region: no-drag;
      }

      /* ── Adımlar ──────────────────────────────────────────────────────────── */
      .steps {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid transparent;
        opacity: 0.3;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .step.active {
        opacity: 1;
        background: var(--accent-d);
        border-color: rgba(232, 160, 32, 0.2);
      }
      .step.done {
        opacity: 0.6;
        background: var(--green-d);
        border-color: rgba(61, 214, 140, 0.1);
      }
      .step.error {
        opacity: 1;
        background: var(--red-d);
        border-color: rgba(245, 96, 96, 0.2);
      }

      .step-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--border);
        position: relative;
        font-weight: bold;
      }

      .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(232, 160, 32, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .step.active .spinner {
        display: block;
      }
      .step.active .icon-char {
        display: none;
      }
      .step.done .icon-char::after {
        content: "✓";
        color: var(--green);
      }
      .step.error .icon-char::after {
        content: "✕";
        color: var(--red);
      }

      .step-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--bright);
      }
      .step-sub {
        font-size: 12px;
        color: var(--dim);
        margin-top: 3px;
      }

      /* ── Progress Bar ─────────────────────────────────────────────────────── */
      .step-progress {
        height: 4px;
        background: var(--border);
        border-radius: 10px;
        margin-top: 10px;
        display: none;
        overflow: hidden;
      }
      .step[data-step="2"].active .step-progress,
      .step[data-step="2"].done .step-progress {
        display: block;
      }

      .step-progress-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.3s ease;
      }

      .error-box {
        display: none;
        margin-top: 20px;
        padding: 12px;
        background: var(--red-d);
        border: 1px solid rgba(245, 96, 96, 0.2);
        border-radius: 8px;
        font-size: 12px;
        color: var(--red);
        text-align: center;
      }
      .error-box.visible {
        display: block;
      }

      .close-btn {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: var(--border);
        border: none;
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
        display: none;
      }
      .error-box.visible + .close-btn {
        display: block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="logo">My<span>SETUP</span></div>

    <div class="card">
      <div class="steps">
        <div class="step waiting" data-step="1">
          <div class="step-icon">
            <div class="spinner"></div>
            <span class="icon-char"></span>
          </div>
          <div class="step-body">
            <div class="step-label">Sunucu Bağlantısı</div>
            <div id="sub1" class="step-sub">Sürüm kontrol ediliyor...</div>
          </div>
        </div>

        <div class="step waiting" data-step="2">
          <div class="step-icon">
            <div class="spinner"></div>
            <span class="icon-char"></span>
          </div>
          <div class="step-body">
            <div class="step-label">Dosya İndirme</div>
            <div id="sub2" class="step-sub">Sıraya alındı...</div>
            <div class="step-progress">
              <div id="progressFill" class="step-progress-fill"></div>
            </div>
          </div>
        </div>

        <div class="step waiting" data-step="3">
          <div class="step-icon">
            <div class="spinner"></div>
            <span class="icon-char"></span>
          </div>
          <div class="step-body">
            <div class="step-label">Sistem Güncelleme</div>
            <div id="sub3" class="step-sub">Hazırlanıyor...</div>
          </div>
        </div>

        <div class="step waiting" data-step="4">
          <div class="step-icon">
            <div class="spinner"></div>
            <span class="icon-char"></span>
          </div>
          <div class="step-body">
            <div class="step-label">Tamamlanıyor</div>
            <div id="sub4" class="step-sub">Bekleniyor...</div>
          </div>
        </div>
      </div>

      <div class="error-box" id="errorBox"></div>
      <button class="close-btn" onclick="window.close()">Kapat</button>
    </div>

    <script>
      const { ipcRenderer } = require("electron");

      const TEXTS = {
        active: {
          1: "GitHub Release API kontrol ediliyor...",
          2: "Yeni sürüm paketi indiriliyor...",
          3: "Kurulum başlatıldı, lütfen bekleyin...",
          4: "MySetup yeniden başlatılıyor...",
        },
        done: {
          1: "Yeni sürüm bilgisi doğrulandı.",
          2: "Dosya başarıyla indirildi.",
          3: "Kurulum tamamlandı.",
          4: "Uygulama hazır!",
        },
      };

      ipcRenderer.on("step", (_e, { step, state, progress }) => {
        const el = document.querySelector(`.step[data-step="${step}"]`);
        const sub = document.getElementById(`sub${step}`);
        const fill = document.getElementById("progressFill");

        if (!el) return;

        // State yönetimi
        el.classList.remove("waiting", "active", "done", "error");
        el.classList.add(state);

        if (state === "active") {
          sub.textContent = TEXTS.active[step];
          if (step === 2 && progress !== null) {
            fill.style.width = progress + "%";
            sub.textContent = `İndiriliyor: %${progress}`;
          }
        } else if (state === "done") {
          sub.textContent = TEXTS.done[step];
          if (step === 2) fill.style.width = "100%";
        }
      });

      ipcRenderer.on("fatal_error", (_e, message) => {
        // Aktif olan adımı hata moduna çek
        const activeStep = document.querySelector(".step.active");
        if (activeStep) {
          activeStep.classList.remove("active");
          activeStep.classList.add("error");
        }

        const box = document.getElementById("errorBox");
        box.textContent = `Hata: ${message}`;
        box.classList.add("visible");
      });
    </script>
  </body>
</html>
